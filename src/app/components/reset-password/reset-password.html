<div class="rp-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="card rp-card shadow-lg border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock display-3 text-motorx-primary"></i>
        <h2 class="mt-2 fw-bold">Nueva contraseña</h2>
      </div>

      @if (error()) {
        <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}</div>
      }

      @if (success()) {
        <div class="alert alert-success py-2 text-center">
          <i class="bi bi-check-circle me-2"></i>¡Contraseña restablecida exitosamente!
        </div>
        <a routerLink="/login" class="btn btn-primary w-100 py-2">Ir al login</a>
      } @else {
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label for="token" class="form-label">Código de recuperación</label>
            <input type="text" class="form-control" id="token" placeholder="Código recibido por correo"
              [ngModel]="token()" (ngModelChange)="token.set($event)" name="token" required />
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control" id="newPassword"
              placeholder="Mín. 8 caracteres, 1 mayúscula, 1 número, 1 símbolo"
              [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)" name="newPassword" required />
            <div class="form-text">Mínimo 8 caracteres, 1 mayúscula, 1 número y 1 símbolo</div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Restablecer contraseña
          </button>
        </form>
      }

      <div class="text-center mt-4">
        <a routerLink="/login" class="text-decoration-none text-motorx-primary">Volver al login</a>
      </div>
    </div>
  </div>
</div>
