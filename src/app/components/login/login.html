<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="card login-card shadow-lg border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-gear-wide-connected display-3 text-motorx-primary"></i>
        <h2 class="mt-2 fw-bold">MotorX</h2>
        <p class="text-muted">Inicia sesión en tu cuenta</p>
      </div>

      @if (error()) {
        <div class="alert alert-danger py-2" role="alert">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
        </div>
      }

      @if (!needs2FA()) {
        <form (ngSubmit)="onLogin()">
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="correo@ejemplo.com"
                [ngModel]="email()"
                (ngModelChange)="email.set($event)"
                name="email"
                required
              />
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Tu contraseña"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                name="password"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 mt-2" [disabled]="loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Iniciar sesión
          </button>
        </form>
      } @else {
        <form (ngSubmit)="onVerify2FA()">
          <p class="text-center text-muted mb-3">
            <i class="bi bi-shield-lock me-1"></i>
            Ingresa el código de 6 dígitos enviado a tu correo
          </p>
          <div class="mb-3">
            <label for="code" class="form-label">Código de verificación</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-key"></i></span>
              <input
                type="text"
                class="form-control text-center fs-4 letter-spacing"
                id="code"
                placeholder="000000"
                maxlength="6"
                [ngModel]="code2FA()"
                (ngModelChange)="code2FA.set($event)"
                name="code"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 mt-2" [disabled]="loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Verificar código
          </button>
        </form>
      }

      <div class="text-center mt-4">
        <a routerLink="/forgot-password" class="text-decoration-none text-motorx-primary">
          ¿Olvidaste tu contraseña?
        </a>
      </div>
      <div class="text-center mt-2">
        <span class="text-muted">¿No tienes cuenta?</span>
        <a routerLink="/register" class="text-decoration-none text-motorx-primary ms-1">
          Regístrate
        </a>
      </div>
    </div>
  </div>
</div>
