<div class="fp-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="card fp-card shadow-lg border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-envelope-paper display-3 text-motorx-primary"></i>
        <h2 class="mt-2 fw-bold">Recuperar contraseña</h2>
        <p class="text-muted">Ingresa tu correo para recibir un código de recuperación</p>
      </div>

      @if (error()) {
        <div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}</div>
      }
      @if (message()) {
        <div class="alert alert-success py-2"><i class="bi bi-check-circle me-2"></i>{{ message() }}</div>
      }

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com"
            [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Enviar código
        </button>
      </form>

      <div class="text-center mt-4">
        <a routerLink="/reset-password" class="text-decoration-none text-motorx-primary">¿Ya tienes un código?</a>
      </div>
      <div class="text-center mt-2">
        <a routerLink="/login" class="text-decoration-none text-motorx-primary">Volver al login</a>
      </div>
    </div>
  </div>
</div>
