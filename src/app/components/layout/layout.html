<nav class="navbar navbar-expand-lg navbar-dark navbar-motorx sticky-top">
  <div class="container-fluid">

      <i class="bi bi-gear-wide-connected me-2 fs-4"></i>
      MotorX

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <!-- Client Navigation -->
      @if (!isAdmin) {
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
              <i class="bi bi-house me-1"></i>Inicio
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/vehicles" routerLinkActive="active">
              <i class="bi bi-bicycle me-1"></i>Mis motos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/appointments" routerLinkActive="active">
              <i class="bi bi-calendar-check me-1"></i>Mis citas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/appointments/new" routerLinkActive="active">
              <i class="bi bi-plus-circle me-1"></i>Agendar cita
            </a>
          </li>
        </ul>
      }

      <!-- Admin Navigation -->
      @if (isAdmin) {
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
              <i class="bi bi-speedometer2 me-1"></i>Agenda
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/calendar" routerLinkActive="active">
              <i class="bi bi-calendar3 me-1"></i>Calendario
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/employees" routerLinkActive="active">
              <i class="bi bi-people me-1"></i>Empleados
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">
              <i class="bi bi-person-lines-fill me-1"></i>Usuarios
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/vehicles" routerLinkActive="active">
              <i class="bi bi-bicycle me-1"></i>Vehículos
            </a>
          </li>
        </ul>

      <!-- Right side -->
      <ul class="navbar-nav">
        <li class="nav-item">
          <button class="nav-link btn btn-link" (click)="toggleTheme()" title="Cambiar tema">

        </li>

              <button class="dropdown-item text-danger" (click)="onLogout()">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid py-4 px-3 px-lg-5">
  <router-outlet />
